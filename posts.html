<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文章列表 - 我的个人博客</title>
<link rel="stylesheet" href="styles.css">
<style>
/* 补充样式：嵌套的 post-group 内边距 */
.post-group .post-group {
  margin: 8px 0 8px 16px;
}
.post-group .post-group .post-group {
  margin-left: 16px;
}
.post-group .post-list {
  padding: 0 20px 20px;
}
.post-group .post-group .post-list {
  padding: 0 16px 16px;
}
/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #9ca3af;
  font-size: 16px;
}
.empty-state span {
  font-size: 48px;
  display: block;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<header class="site-header">
<div class="container header-inner">
<div class="logo">我的博客</div>
<nav class="nav">
<a href="index.html" class="nav-link">首页</a>
<a href="posts.html" class="nav-link active">文章</a>
<a href="about.html" class="nav-link">关于</a>
</nav>
</div>
</header>
<main class="site-main">
<section class="section">
<div class="container">
<h1 class="section-title">全部文章</h1>
<div class="post-search">
<input id="post-search-input" type="text" placeholder="输入关键词搜索文章…">
</div>
<div id="post-groups" class="post-groups">
  <!-- 由 JavaScript 动态生成 -->
</div>
<div id="post-count" style="text-align:center;color:#9ca3af;font-size:14px;margin-top:20px;"></div>
</div>
</section>
</main>
<footer class="site-footer">
<div class="container footer-inner">
<span>© <span id="year"></span> 我的个人博客</span>
<span>Powered by GitHub Pages</span>
</div>
</footer>

<script src="posts-data.js"></script>
<script>
(function() {
  document.getElementById("year").textContent = new Date().getFullYear();

  // ---- 配置 ----
  var CATEGORY_NAMES = {
    '编程题目': '编程题目',
    '科研': '科研',
    'courses': '课程',
    'others': '其他'
  };

  // 顶层显示顺序
  var CATEGORY_ORDER = ['编程题目', '科研', 'courses', 'others'];

  // ---- 工具函数 ----
  function encodePath(filePath) {
    return filePath.split('/').map(function(seg) {
      return encodeURIComponent(seg);
    }).join('/');
  }

  var collator = new Intl.Collator('zh-CN', { numeric: true, sensitivity: 'base' });

  // 提取标题中的前导数字（如 "001 Attention..." -> 1）
  function getLeadingNumber(text) {
    var m = (text || '').trim().match(/^(\d+)/);
    return m ? parseInt(m[1], 10) : Number.MAX_SAFE_INTEGER;
  }

  // ---- 从文件路径构建树 ----
  function buildTree(posts) {
    var tree = {};

    posts.forEach(function(post) {
      // file 格式: "posts/编程题目/xxx.md" 或 "posts/courses/软件系统设计/xxx.pdf"
      var parts = post.file.split('/');
      // parts[0] = "posts", parts[1] = 顶级分类, parts[2+] = 子目录/文件名

      var topCat = parts[1] || 'others';
      if (!tree[topCat]) {
        tree[topCat] = { posts: [], children: {} };
      }

      // 剩余的路径段（除去 "posts" 和 顶级分类）
      // 例如: ["软件系统设计", "01面向对象的设计原则", "xxx.pdf"]
      var remaining = parts.slice(2);

      if (remaining.length === 1) {
        // 文件直接在分类根目录下
        tree[topCat].posts.push(post);
      } else {
        // 有子目录结构
        var current = tree[topCat];
        // 除了最后一个（文件名），中间的都可能是子目录
        for (var i = 0; i < remaining.length - 1; i++) {
          var seg = remaining[i];
          if (!current.children[seg]) {
            current.children[seg] = { posts: [], children: {} };
          }
          current = current.children[seg];
        }
        current.posts.push(post);
      }
    });

    return tree;
  }

  // ---- 排序 ----
  function sortPosts(posts, groupName) {
    posts.sort(function(a, b) {
      // 论文阅读组按前导数字排序
      if (groupName === '论文阅读') {
        var an = getLeadingNumber(a.title);
        var bn = getLeadingNumber(b.title);
        if (an !== bn) return an - bn;
      }
      // 默认按日期降序，同日期按标题排序
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      return collator.compare(a.title, b.title);
    });
  }

  function sortTree(tree) {
    for (var cat in tree) {
      if (!tree.hasOwnProperty(cat)) continue;
      sortPosts(tree[cat].posts, cat);
      sortChildren(tree[cat].children, cat);
    }
  }

  function sortChildren(children, parentName) {
    for (var key in children) {
      if (!children.hasOwnProperty(key)) continue;
      sortPosts(children[key].posts, key);
      sortChildren(children[key].children, key);
    }
  }

  // ---- 渲染 ----
  function createPostItem(post) {
    var article = document.createElement('article');
    article.className = 'post-item';
    article.setAttribute('data-search-text', (post.title + ' ' + post.excerpt + ' ' + post.file).toLowerCase());

    var href = post.viewer + '?file=' + encodePath(post.file);

    var link = document.createElement('a');
    link.className = 'post-title-link';
    link.href = href;
    link.textContent = post.title;

    var meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = post.date;

    article.appendChild(link);
    article.appendChild(meta);

    if (post.excerpt) {
      var excerpt = document.createElement('p');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      article.appendChild(excerpt);
    }

    return article;
  }

  function createPostList(posts) {
    var list = document.createElement('div');
    list.className = 'post-list';
    posts.forEach(function(post) {
      list.appendChild(createPostItem(post));
    });
    return list;
  }

  function createGroup(name, posts, children, depth) {
    var details = document.createElement('details');
    details.className = 'post-group';
    if (depth === 0) {
      details.open = true; // 顶级分组默认展开
    }

    var summary = document.createElement('summary');
    var count = countAllPosts(posts, children);
    summary.textContent = name + ' (' + count + ')';
    details.appendChild(summary);

    // 先添加当前层级的文章
    if (posts.length > 0) {
      details.appendChild(createPostList(posts));
    }

    // 递归添加子分组
    if (children && Object.keys(children).length > 0) {
      // 对子分组按名称排序
      var childKeys = Object.keys(children).sort(function(a, b) {
        var an = getLeadingNumber(a);
        var bn = getLeadingNumber(b);
        if (an !== bn) return an - bn;
        return collator.compare(a, b);
      });

      for (var i = 0; i < childKeys.length; i++) {
        var key = childKeys[i];
        var child = children[key];
        details.appendChild(createGroup(key, child.posts, child.children, depth + 1));
      }
    }

    return details;
  }

  function countAllPosts(posts, children) {
    var count = posts.length;
    if (children) {
      for (var key in children) {
        if (children.hasOwnProperty(key)) {
          count += countAllPosts(children[key].posts, children[key].children);
        }
      }
    }
    return count;
  }

  function renderAll(tree) {
    var container = document.getElementById('post-groups');
    container.innerHTML = '';

    var totalCount = 0;

    // 按指定顺序渲染顶层分类
    for (var i = 0; i < CATEGORY_ORDER.length; i++) {
      var catKey = CATEGORY_ORDER[i];
      var catData = tree[catKey];
      if (!catData) continue;

      var displayName = CATEGORY_NAMES[catKey] || catKey;
      var group = createGroup(displayName, catData.posts, catData.children, 0);
      container.appendChild(group);
      totalCount += countAllPosts(catData.posts, catData.children);
    }

    // 处理任何不在 CATEGORY_ORDER 中的额外分类
    for (var key in tree) {
      if (tree.hasOwnProperty(key) && CATEGORY_ORDER.indexOf(key) === -1) {
        var displayName = CATEGORY_NAMES[key] || key;
        var group = createGroup(displayName, tree[key].posts, tree[key].children, 0);
        container.appendChild(group);
        totalCount += countAllPosts(tree[key].posts, tree[key].children);
      }
    }

    document.getElementById('post-count').textContent = '共 ' + totalCount + ' 篇文章';
  }

  // ---- 搜索 ----
  function setupSearch() {
    var searchInput = document.getElementById('post-search-input');
    if (!searchInput) return;

    searchInput.addEventListener('input', function() {
      var keyword = searchInput.value.trim().toLowerCase();
      var items = document.querySelectorAll('.post-item');
      var visibleCount = 0;

      items.forEach(function(item) {
        var searchText = item.getAttribute('data-search-text') || '';
        if (!keyword || searchText.indexOf(keyword) !== -1) {
          item.style.display = '';
          visibleCount++;
        } else {
          item.style.display = 'none';
        }
      });

      // 更新分组可见性
      updateGroupVisibility(!!keyword);
      document.getElementById('post-count').textContent =
        (keyword ? '搜索到 ' + visibleCount + ' 篇文章' : '共 ' + items.length + ' 篇文章');
    });
  }

  function updateGroupVisibility(expandAll) {
    var groups = document.querySelectorAll('.post-group');
    groups.forEach(function(group) {
      var visibleCount = 0;
      var items = group.querySelectorAll('.post-item');
      items.forEach(function(item) {
        if (item.style.display !== 'none') visibleCount++;
      });
      if (visibleCount === 0) {
        group.style.display = 'none';
      } else {
        group.style.display = '';
      }
      if (expandAll) {
        group.open = true;
      }
    });
  }

  // ---- 初始化 ----
  function init() {
    var tree = buildTree(POSTS_DATA);
    sortTree(tree);
    renderAll(tree);
    setupSearch();
  }

  // 等待 DOM 和数据都就绪
  if (typeof POSTS_DATA !== 'undefined') {
    init();
  } else {
    // 如果数据文件还没加载（极少情况），等待
    window.addEventListener('load', function() {
      if (typeof POSTS_DATA !== 'undefined') init();
    });
  }
})();
</script>
</body>
</html>
